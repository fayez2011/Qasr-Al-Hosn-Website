                            <div className="grid md:grid-cols-2 gap-12">
                                <div>
                                    <h3 className="text-2xl font-bold mb-6 text-gray-900">🔗 Official Sites</h3>
                                    <div className="space-y-4">
                                        <a href="https://qasralhosn.ae" target="_blank" className="block bg-amber-50 hover:bg-amber-100 p-6 transition-all">
                                            <p className="font-bold text-amber-900 text-lg">Qasr Al Hosn Official Site</p>
                                            <p className="text-gray-600">qasralhosn.ae</p>
                                        </a>
                                        <a href="https://dct.gov.ae" target="_blank" className="block bg-amber-50 hover:bg-amber-100 p-6 transition-all">
                                            <p className="font-bold text-amber-900 text-lg">Department of Culture and Tourism</p>
                                            <p className="text-gray-600">dct.gov.ae</p>
                                        </a>
                                    </div>
                                </div>

                                <div>
                                    <h3 className="text-2xl font-bold mb-6 text-gray-900">📚 More Stuff</h3>
                                    <ul className="space-y-3 text-lg text-gray-700">
                                        <li>• Books about UAE history at Qasr Al Hosn</li>
                                        <li>• Documentaries on Abu Dhabis founding at Qasr Al Hosn</li>
                                        <li>• Articles about architecture at Qasr Al Hosn</li>
                                        <li>• Info on the pearl industry at Qasr Al Hosn</li>
                                    </ul>
                                </div>
                            </div>

                            <div className="mt-12 bg-gradient-to-r from-amber-50 to-orange-50 p-8">
                                <h3 className="text-xl font-bold mb-3 text-gray-900">📖 Our Sources</h3>
                                <p className="text-gray-700">
                                    Got info from official government sites, educational resources on UAE heritage and historical records about Qasr Al Hosn. Checked everything against sources to make sure it's accurate about Qasr Al Hosn.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-gradient-to-r from-amber-900 to-amber-800 text-white py-12">
                        <div className="max-w-6xl mx-auto px-6 text-center">
                            <p className="text-2xl font-bold mb-2">Multimedia Project, on Cultural Heritage</p>
                            <p className="text-amber-200 text-lg">Fayez Akkad, Majd Yousif, Ayham Albasha, Ram Khaddam</p>
                            <p className="text-amber-200 mt-2">Grade 9B. 2026</p>
                            <p className="text-amber-100 mt-6">Where Abu Dhabi began at Qasr Al Hosn</p>
                        </div>
                    </footer>

                    {/* Quiz Modal */}
                    {showQuiz && <QuizModal onClose={() => setShowQuiz(false)} />}
                </div>
            );
        }

        // Timeline Item
        function TimelineItem({ year, title, text }) {
            return (
                <div className="flex gap-6">
                    <div className="flex flex-col items-center">
                        <div className="timeline-dot shrink-0"></div>
                        <div className="timeline-line w-1 flex-1 mt-2"></div>
                    </div>
                    <div className="pb-8 flex-1">
                        <p className="text-amber-800 font-bold text-lg mb-1">{year}</p>
                        <h3 className="text-2xl font-bold text-gray-900 mb-3">{title}</h3>
                        <p className="text-gray-700 text-lg leading-relaxed">{text}</p>
                    </div>
                </div>
            );
        }

        // Fact Card
        function FactCard({ icon, title, fact, revealed, onReveal }) {
            return (
                <div
                    onClick={onReveal}
                    className={`p-8 cursor-pointer transition-all hover-lift ${
                        revealed ? 'bg-gradient-to-br from-amber-100 to-orange-100' : 'bg-gray-100 hover:bg-gray-200'
                    }`}
                >
                    <div className="text-5xl mb-4">{icon}</div>
                    <h3 className="text-xl font-bold text-gray-900 mb-3">{title}</h3>
                    {revealed ? (
                        <p className="text-gray-700 leading-relaxed">{fact}</p>
                    ) : (
                        <p className="text-gray-500 italic">Click to see it at Qasr Al Hosn</p>
                    )}
                </div>
            );
        }

        // Quiz Modal
        function QuizModal({ onClose }) {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [done, setDone] = useState(false);
            const [selected, setSelected] = useState(null);

            const questions = [
                {
                    q: "When was the watchtower first built?",
                    options: ["1761", "1800", "1850", "1900"],
                    correct: 0
                },
                {
                    q: "What was the fort protecting?",
                    options: ["Gold treasure", "A freshwater well", "Royal jewels", "Trading goods"],
                    correct: 1
                },
                {
                    q: "Which family lived there?",
                    options: ["Bani Yas tribe", "Al Nahyan family", "Pearl traders", "Local fishermen"],
                    correct: 1
                },
                {
                    q: "How'd they cool it without electricity?",
                    options: ["Ice rooms", "Wind towers", "Underground tunnels", "Water fountains"],
                    correct: 1
                },
                {
                    q: "When did it reopen as a museum?",
                    options: ["2010", "2015", "2018", "2020"],
                    correct: 2
                }
            ];

            const handleAnswer = (idx) => {
                setSelected(idx);
                if (idx === questions[currentQ].correct) setScore(score + 1);

                setTimeout(() => {
                    if (currentQ < questions.length - 1) {
                        setCurrentQ(currentQ + 1);
                        setSelected(null);
                    } else {
                        setDone(true);
                    }
                }, 1000);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                    <div className="bg-white max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="bg-gradient-to-r from-amber-700 to-amber-600 p-8 text-white flex justify-between items-center">
                            <h2 className="text-3xl font-bold">Quiz Time</h2>
                            <button onClick={onClose} className="text-4xl hover:opacity-75">&times;</button>
                        </div>

                        <div className="p-10">
                            {!done ? (
                                <>
                                    <div className="mb-8">
                                        <div className="flex justify-between text-gray-600 mb-3">
                                            <span className="font-semibold">Question {currentQ + 1} of {questions.length}</span>
                                            <span className="font-semibold">Score: {score}</span>
                                        </div>
                                        <div className="w-full bg-gray-200 h-3">
                                            <div className="bg-amber-600 h-3 transition-all" style={{width: `${((currentQ + 1) / questions.length) * 100}%`}}></div>
                                        </div>
                                    </div>

                                    <h3 className="text-2xl font-bold text-gray-900 mb-8">{questions[currentQ].q}</h3>

                                    <div className="space-y-4">
                                        {questions[currentQ].options.map((opt, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => handleAnswer(idx)}
                                                disabled={selected !== null}
                                                className={`w-full p-5 text-left text-lg font-semibold transition-all ${
                                                    selected === null
                                                        ? 'bg-gray-100 hover:bg-amber-100'
                                                        : selected === idx
                                                            ? idx === questions[currentQ].correct
                                                                ? 'bg-green-100 border-2 border-green-600'
                                                                : 'bg-red-100 border-2 border-red-600'
                                                            : idx === questions[currentQ].correct
                                                                ? 'bg-green-100 border-2 border-green-600'
                                                                : 'bg-gray-100'
                                                }`}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                </>
                            ) : (
                                <div className="text-center py-12">
                                    <div className="text-8xl mb-6">{score === 5 ? '🏆' : score >= 3 ? '⭐' : '📚'}</div>
                                    <h3 className="text-4xl font-bold text-gray-900 mb-6">All Done!</h3>
                                    <p className="text-3xl text-gray-700 mb-8">You got {score} out of 5 right</p>
                                    <p className="text-xl text-gray-600 mb-12">
                                        {score === 5 ? "Perfect! You know your stuff about the fort!" :
                                         score >= 3 ? "Nice! Got most of them right!" :
                                         "Not bad! Check out the site again and retry!"}
                                    </p>
                                    <button
                                        onClick={onClose}
                                        className="bg-gradient-to-r from-amber-700 to-amber-600 text-white px-10 py-4 text-lg font-bold hover:from-amber-800 hover:to-amber-700"
                                    >
                                        Close
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<QasrAlHosnWebsite />, document.getElementById('root'));
    </script>
</body>
</html>
