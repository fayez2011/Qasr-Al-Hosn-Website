<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qasr Al Hosn - Where Abu Dhabi Began</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Montserrat', sans-serif;
        }

        h1, h2, h3 {
            font-family: 'Rubik', sans-serif;
        }

        body {
            background: #fafafa;
            overflow-x: hidden;
            font-size: 16px;
        }

        @media (min-width: 768px) {
            body {
                font-size: 18px;
            }
        }

        .hero-gradient {
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(184,134,11,0.8) 50%, rgba(205,133,63,0.7) 100%),
                        url('inner courtyard.jpg') center/cover no-repeat;
            position: relative;
            padding-top: 50px;
        }

        .hero-gradient::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('inner courtyard.jpg') center/cover no-repeat;
            filter: contrast(1.15);
            z-index: -1;
        }

        .text-shadow {
            text-shadow: 1px 1px 8px rgba(0,0,0,0.4), 0 0 16px rgba(0,0,0,0.25);
        }

        .hover-lift {
            transition: transform 0.25s ease;
        }

        .hover-lift:hover {
            transform: translateY(-3px);
        }

        /* Image Overlay/Lightbox */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease-out;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            animation: scaleIn 0.25s ease-out;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
        }

        .lightbox-close:hover {
            background: white;
        }

        .lightbox-close:focus-visible {
            outline: 2px solid #b8860b;
            outline-offset: 2px;
        }

        .lightbox-caption {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .timeline-dot {
            width: 24px;
            height: 24px;
            border: 4px solid #b8860b;
            background: white;
            border-radius: 50%;
        }

        .timeline-line {
            width: 2px;
            background: linear-gradient(to bottom, #b8860b, #daa520);
        }

        .section-padding {
            padding: 80px 0;
        }

        .accent-border {
            border-left: 4px solid #b8860b;
        }

        .scroll-fade {
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        .scroll-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Better mobile spacing */
        @media (max-width: 768px) {
            .section-padding {
                padding: 48px 0;
            }
        }

        /* Enhanced Typography */
        h1, h2, h3 {
            font-family: 'Rubik', sans-serif;
            font-weight: 500;
        }

        p, div, span {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.65;
        }

        .hero-gradient h1 {
            color: #ffffff;
            font-weight: 500;
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 14px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
        }

        .navbar.scrolled {
            padding: 10px 0;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 2px 15px rgba(0,0,0,0.12);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
            justify-content: center;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: #333;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.25s ease;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            padding: 8px 12px;
            border-radius: 4px;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .nav-links a:focus-visible {
            outline: 2px solid #b8860b;
            outline-offset: 2px;
        }

        .nav-links a:hover {
            color: #b8860b;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 16px;
                flex-wrap: wrap;
                padding: 0 20px;
            }

            .nav-links a {
                font-size: 12px;
            }
        }

        /* Icon Styling */
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b8860b, #daa520);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            box-shadow: 0 4px 12px rgba(184, 134, 11, 0.3);
        }

        .section-icon {
            font-size: 2.5rem;
            margin-right: 12px;
            color: #b8860b;
        }

        /* Accessibility improvements */
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid #b8860b;
            outline-offset: 2px;
        }

        /* Proper touch targets */
        button {
            min-height: 44px;
            min-width: 44px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function QasrAlHosnWebsite() {
            const [showQuiz, setShowQuiz] = useState(false);
            const [revealedFacts, setRevealedFacts] = useState({});
            const [navScrolled, setNavScrolled] = useState(false);
            const [lightboxImage, setLightboxImage] = useState(null);

            useEffect(() => {
                let lastScrollY = window.scrollY;

                const handleScroll = () => {
                    const currentScrollY = window.scrollY;
                    const scrollingDown = currentScrollY > lastScrollY;

                    // Handle navbar scroll effect
                    if (currentScrollY > 50) {
                        setNavScrolled(true);
                    } else {
                        setNavScrolled(false);
                    }

                    if (scrollingDown) {
                        const sections = document.querySelectorAll('.scroll-fade');
                        sections.forEach(section => {
                            const rect = section.getBoundingClientRect();
                            const isVisible = rect.top < window.innerHeight - 100;

                            if (isVisible) {
                                section.classList.add('visible');
                            }
                        });
                    }

                    lastScrollY = currentScrollY;
                };

                window.addEventListener('scroll', handleScroll);
                handleScroll();

                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen">

                    {/* Navigation Bar */}
                    <nav className={`navbar ${navScrolled ? 'scrolled' : ''}`}>
                        <ul className="nav-links">
                            <li><a href="#intro" onClick={(e) => { e.preventDefault(); document.getElementById('intro').scrollIntoView({ behavior: 'smooth' }); }}>Home</a></li>
                            <li><a href="#history" onClick={(e) => { e.preventDefault(); document.getElementById('history').scrollIntoView({ behavior: 'smooth' }); }}>History</a></li>
                            <li><a href="#architecture" onClick={(e) => { e.preventDefault(); document.getElementById('architecture').scrollIntoView({ behavior: 'smooth' }); }}>Architecture</a></li>
                            <li><a href="#gallery" onClick={(e) => { e.preventDefault(); document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' }); }}>Gallery</a></li>
                            <li><a href="#culture" onClick={(e) => { e.preventDefault(); document.getElementById('culture').scrollIntoView({ behavior: 'smooth' }); }}>Culture</a></li>
                            <li><a href="#visitor" onClick={(e) => { e.preventDefault(); document.getElementById('visitor').scrollIntoView({ behavior: 'smooth' }); }}>Visit</a></li>
                        </ul>
                    </nav>

                    {/* Hero Section */}
                    <header id="intro" className="hero-gradient relative" style={{minHeight: '85vh'}}>
                        <div className="absolute inset-0 bg-black opacity-20"></div>
                        <div className="relative z-10 flex flex-col items-center justify-center text-white px-6" style={{minHeight: '85vh'}}>
                            <h1 className="text-7xl md:text-9xl mb-6 text-shadow text-center" style={{letterSpacing: '-2px', fontWeight: '500'}}>
                                Qasr Al Hosn
                            </h1>
                            <p className="text-3xl md:text-4xl mb-4 text-center font-semibold text-shadow" style={{letterSpacing: '1px'}}>The Birth of Abu Dhabi</p>
                            <p className="text-xl md:text-2xl max-w-3xl text-center mb-12 font-light" style={{textShadow: '2px 2px 8px rgba(0,0,0,0.8)', lineHeight: '1.6'}}>
                                Built in 1761 as a watchtower, Qasr Al Hosn became the foundation of what is now the capital of the UAE
                            </p>
                            <button
                                onClick={() => document.getElementById('history').scrollIntoView({ behavior: 'smooth' })}
                                className="bg-white text-amber-900 px-12 py-5 text-xl font-semibold hover:bg-amber-50 transition-all shadow-2xl"
                                style={{borderRadius: '8px', letterSpacing: '0.5px', minHeight: '44px', minWidth: '44px'}}
                                aria-label="Scroll to history section"
                            >
                                Explore the History
                            </button>
                        </div>
                    </header>

                    {/* History Timeline */}
                    <section id="history" className="section-padding bg-white scroll-fade">
                        <div className="max-w-6xl mx-auto px-6">
                            <h2 className="text-5xl text-gray-900 mb-4" style={{fontWeight: '500'}}>Qasr Al Hosn Timeline: Tower →Museum</h2>
                            <p className="text-xl text-gray-600 mb-4">250+ years of history all in one spot; it started as a tower and ended up resulting in the creation of an entire city, Qasr Al Hosn is where it all started.</p>
                            <p className="text-lg text-gray-500 mb-16">This is the timeline of Qasr Al Hosn's transition from tower to museum.</p>

                            <div className="space-y-12">
                                <TimelineItem
                                    year="1761"
                                    title="Just a Tower at First"
                                    text="Bani Yas tribe built a watchtower at Qasr Al Hosn in order to protect a freshwater well which was located there. In the desert, water meant survival, so the well made Qasr Al Hosn an extremely significant place."
                                />
                                <TimelineItem
                                    year="Early 1800s"
                                    title="The Impact of The Al Nahyan Family"
                                    text="The Al Nahyan family took over Qasr Al Hosn and expanded it from a simple watchtower into a full fort. From that point on, Qasr Al Hosn became the place where major decisions were made and important discussions took place, turning it into the political heart of Abu Dhabi."
                                />
                                <TimelineItem
                                    year="1800s - 1930s"
                                    title="Pearl Diving Era"
                                    text="Pearl diving was an important way of making money back then, remaining a key part of Abu Dhabi's economy as the settlement grew around Qasr Al Hosn. The fort protected the community, watched over coastal trade routes, and helped maintain safety and stability during a time when pearling was at its peak."
                                />
                                <TimelineItem
                                    year="1950s"
                                    title="Oil Era"
                                    text="When oil was discovered, Abu Dhabi's entire economy shifted, leading to a major turning point in its history. As development accelerated, the city began shifting from a small coastal town into the modern capital it is today."
                                />
                                <TimelineItem
                                    year="1980s–2007"
                                    title="Becoming a Cultural Landmark"
                                    text="As Abu Dhabi continued to grow, Qasr Al Hosn changed from being a political center into a cultural and historical landmark. The fort was restored and preserved so people could learn about the city's beginnings and understand how life looked in the past."
                                />
                                <TimelineItem
                                    year="2018–Present"
                                    title="Qasr Al Hosn Today"
                                    text="Today, Qasr Al Hosn stands as one of Abu Dhabi's most important heritage sites. It represents the city's journey from a small desert settlement to a modern global capital, while still protecting the stories, traditions, and identity of the UAE."
                                />
                            </div>
                        </div>
                    </section>

                    {/* Architecture */}
                    <section id="architecture" className="section-padding bg-gray-50 scroll-fade">
                        <div className="max-w-7xl mx-auto px-6">
                            <h2 className="text-5xl text-gray-900 mb-4" style={{fontWeight: '500'}}>Built Without Modern Tech</h2>
                            <p className="text-xl text-gray-600 mb-4">No electricity. No AC. Just desert heat at Qasr Al Hosn.</p>
                            <p className="text-lg text-gray-500 mb-16">Qasr Al Hosn was built using local materials which were the main resources available at the time. The builders used these materials creatively, giving the fort a design that matched the environment, as well as fulfilling and serving the needs of the community.</p>

                            <div className="grid md:grid-cols-3 gap-8 mb-16">
                                <div className="text-center">
                                    <div className="icon-circle" aria-hidden="true">
                                        <i className="fas fa-water"></i>
                                    </div>
                                    <h3 className="text-2xl font-semibold text-gray-900 mb-3">Coral Stone Blocks</h3>
                                    <p className="text-gray-700">They used blocks made from coral and sea stone during the process of building Qasr Al Hosn since these materials were usually found near, along the coast. Coral stays naturally cool, helping the fort remain comfortable even while it's scorching outside.</p>
                                </div>
                                <div className="text-center">
                                    <div className="icon-circle" aria-hidden="true">
                                        <i className="fas fa-wind"></i>
                                    </div>
                                    <h3 className="text-2xl font-semibold text-gray-900 mb-3">Wind Towers</h3>
                                    <p className="text-gray-700">They used wind towers that caught the breeze and pushed it down into the rooms. This natural airflow system worked almost like AC before electricity even existed, helping the fort stay cool in the heat.</p>
                                </div>
                                <div className="text-center">
                                    <div className="icon-circle" aria-hidden="true">
                                        <i className="fas fa-building"></i>
                                    </div>
                                    <h3 className="text-2xl font-semibold text-gray-900 mb-3">Really Thick Walls</h3>
                                    <p className="text-gray-700">The walls were extremely thick which stopped the heat from getting through during the day at Qasr Al Hosn. At night, those same walls helped keep the warmth inside, making the fort more comfortable in the cooler hours.</p>
                                </div>
                            </div>

                            <div className="bg-white p-10 accent-border">
                                <h3 className="text-2xl font-semibold mb-4 text-gray-900">They Used What Was Around Them</h3>
                                <p className="text-lg text-gray-700 leading-relaxed">
                                    Everything used at Qasr Al Hosn came from the surrounding environment: coral from the Gulf waters, palm wood for the roofs, and a mix of sand and crushed shells for the mortar. Each material handled the heat well which made these choices smart for the 1700s at Qasr Al Hosn.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* Role/Importance */}
                    <section id="role" className="section-padding bg-white scroll-fade">
                        <div className="max-w-6xl mx-auto px-6">
                            <h2 className="text-5xl text-gray-900 mb-4" style={{fontWeight: '500'}}>Qasr Al Hosn's Reason for Importance</h2>
                            <p className="text-xl text-gray-600 mb-4">Qasr Al Hosn was way more than just an old building, it was the place where almost everything important in early Abu Dhabi occurred, making it the center of decisions, protection, and community life.</p>
                            <p className="text-lg text-gray-500 mb-16"></p>

                            <div className="grid md:grid-cols-2 gap-8">
                                <div>
                                    <h3 className="text-3xl font-semibold mb-4 text-amber-800 flex items-center">
                                        <i className="fas fa-landmark section-icon" aria-hidden="true"></i>
                                        Where Leaders Met
                                    </h3>
                                    <p className="text-lg text-gray-700">
                                        Leaders met at Qasr Al Hosn to discuss and form decisions about trade, settle arguments, as well as plan important community matters. It was basically Abu Dhabi's first government building, becoming the main place where early leadership and organization took place.
                                    </p>
                                </div>
                                <div>
                                    <h3 className="text-3xl font-semibold mb-4 text-amber-800 flex items-center">
                                        <i className="fas fa-droplet section-icon" aria-hidden="true"></i>
                                        Guarding the Water Supply
                                    </h3>
                                    <p className="text-lg text-gray-700">
                                        It was built at Qasr Al Hosn due to there being a freshwater well underground at that exact spot. In the desert, water meant survival, so Qasr Al Hosn became the perfect place for a settlement to grow.
                                    </p>
                                </div>
                                <div>
                                    <h3 className="text-3xl font-semibold mb-4 text-amber-800 flex items-center">
                                        <i className="fas fa-users section-icon" aria-hidden="true"></i>
                                        Where People Gathered
                                    </h3>
                                    <p className="text-lg text-gray-700">
                                        People gathered at Qasr Al Hosn for celebrations, festivals, and community events. It became the social center of early Abu Dhabi, becoming the main place where everyone met and spent time together.
                                    </p>
                                </div>
                                <div>
                                    <h3 className="text-3xl font-semibold mb-4 text-amber-800 flex items-center">
                                        <i className="fas fa-shield-halved section-icon" aria-hidden="true"></i>
                                        Protecting Trade
                                    </h3>
                                    <p className="text-lg text-gray-700">
                                        The fort watched over the area and helped keep the trade routes safe at Qasr Al Hosn. Since Abu Dhabi depended heavily on trading back then, this protection mattered a lot and kept the community secure.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Gallery/Media */}
                    <section id="gallery" className="section-padding scroll-fade" style={{background: 'linear-gradient(to bottom, #f9f9f9, #ffffff)'}}>
                        <div className="max-w-7xl mx-auto px-6">
                            <h2 className="text-5xl text-gray-900 mb-4 text-center" style={{fontWeight: '500'}}>Photos</h2>
                            <p className="text-xl text-gray-600 mb-16 text-center"></p>

                            {/* Image Gallery */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                <div
                                    className="overflow-hidden hover-lift cursor-pointer rounded-lg shadow-lg bg-white"
                                    onClick={() => setLightboxImage({src: 'main view.webp', alt: 'Qasr Al Hosn Main View', caption: 'The Fort: Present Times'})}
                                >
                                    <img
                                        src="main view.webp"
                                        alt="Qasr Al Hosn Main View"
                                        className="w-full h-80 object-cover"
                                    />
                                    <p className="text-center p-3 font-semibold text-gray-700">The Fort: Present Times</p>
                                </div>
                                <div
                                    className="overflow-hidden hover-lift cursor-pointer rounded-lg shadow-lg bg-white"
                                    onClick={() => setLightboxImage({src: 'original watchtower.webp', alt: 'Original Watchtower', caption: 'The Watchtower'})}
                                >
                                    <img
                                        src="original watchtower.webp"
                                        alt="Original Watchtower"
                                        className="w-full h-80 object-cover"
                                    />
                                    <p className="text-center p-3 font-semibold text-gray-700">The Watchtower</p>
                                </div>
                                <div
                                    className="overflow-hidden hover-lift cursor-pointer rounded-lg shadow-lg bg-white"
                                    onClick={() => setLightboxImage({src: 'fort exterior.jpg', alt: 'Fort Exterior', caption: 'Exterior View'})}
                                >
                                    <img
                                        src="fort exterior.jpg"
                                        alt="Fort Exterior"
                                        className="w-full h-80 object-cover"
                                    />
                                    <p className="text-center p-3 font-semibold text-gray-700">Exterior View</p>
                                </div>
                                <div
                                    className="overflow-hidden hover-lift cursor-pointer rounded-lg shadow-lg bg-white"
                                    onClick={() => setLightboxImage({src: 'inner courtyard.jpg', alt: 'Inner Courtyard', caption: 'Inside the Courtyard'})}
                                >
                                    <img
                                        src="inner courtyard.jpg"
                                        alt="Inner Courtyard"
                                        className="w-full h-80 object-cover"
                                    />
                                    <p className="text-center p-3 font-semibold text-gray-700">Inside the Courtyard</p>
                                </div>
                                <div
                                    className="overflow-hidden hover-lift cursor-pointer rounded-lg shadow-lg bg-white"
                                    onClick={() => setLightboxImage({src: 'old historic qasr al hosn.jpg', alt: 'Historic Qasr Al Hosn', caption: 'The Fort: Historical Times'})}
                                >
                                    <img
                                        src="old historic qasr al hosn.jpg"
                                        alt="Historic Qasr Al Hosn"
                                        className="w-full h-80 object-cover"
                                    />
                                    <p className="text-center p-3 font-semibold text-gray-700">The Fort: Historical Times</p>
                                </div>
                                <div
                                    className="overflow-hidden hover-lift cursor-pointer rounded-lg shadow-lg bg-white"
                                    onClick={() => setLightboxImage({src: 'fort at night.jpg', alt: 'Fort at Night', caption: 'The Fort: Night Time'})}
                                >
                                    <img
                                        src="fort at night.jpg"
                                        alt="Fort at Night"
                                        className="w-full h-80 object-cover"
                                    />
                                    <p className="text-center p-3 font-semibold text-gray-700">The Fort: Night Time</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Culture */}
                    <section id="culture" className="section-padding bg-white scroll-fade">
                        <div className="max-w-6xl mx-auto px-6">
                            <h2 className="text-5xl text-gray-900 mb-4" style={{fontWeight: '500'}}>Part of Emirati Identity</h2>
                            <p className="text-xl text-gray-600 mb-4">Not just some old walls at Qasr Al Hosn; the fort keeps culture and traditions alive.</p>
                            <p className="text-lg text-gray-500 mb-16">It stands as a reminder of how people lived, worked, and built their community, protecting the identity and history of Abu Dhabi.</p>

                            <div className="grid md:grid-cols-2 gap-12">
                                <div>
                                    <h3 className="text-2xl font-semibold mb-3 text-gray-900 flex items-center">
                                        <i className="fas fa-book-open section-icon" aria-hidden="true"></i>
                                        Keeping Stories Alive
                                    </h3>
                                    <p className="text-gray-700 mb-6">
                                        Qasr Al Hosn preserves stories about life before everything became modern. Pearl divers, fishermen, traders, and families all tried to survive around Qasr Al Hosn, shaping the early community. It shows where we came from and keeps the memory of the old Abu Dhabi alive.

        // Lightbox Component
        function Lightbox({ image, onClose }) {
            useEffect(() => {
                const handleEscape = (e) => {
                    if (e.key === 'Escape') onClose();
                };
                document.addEventListener('keydown', handleEscape);
                document.body.style.overflow = 'hidden';

                return () => {
                    document.removeEventListener('keydown', handleEscape);
                    document.body.style.overflow = 'auto';
                };
            }, [onClose]);

            return (
                <div
                    className="lightbox-overlay"
                    onClick={onClose}
                    role="dialog"
                    aria-modal="true"
                    aria-label="Image viewer"
                >
                    <div className="lightbox-content" onClick={(e) => e.stopPropagation()}>
                        <button
                            className="lightbox-close"
                            onClick={onClose}
                            aria-label="Close image viewer"
                        >
                            ×
                        </button>
                        <img
                            src={image.src}
                            alt={image.alt}
                            className="lightbox-image"
                        />
                        <p className="lightbox-caption">{image.caption}</p>
                    </div>
                </div>
            );
        }

        // Quiz Modal
        function QuizModal({ onClose }) {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [done, setDone] = useState(false);
            const [selected, setSelected] = useState(null);

            const questions = [
                {
                    q: "When was the watchtower first built?",
                    options: ["1761", "1800", "1850", "1900"],
                    correct: 0
                },
                {
                    q: "What was the fort protecting?",
                    options: ["Gold treasure", "A freshwater well", "Royal jewels", "Trading goods"],
                    correct: 1
                },
                {
                    q: "Which family lived there?",
                    options: ["Bani Yas tribe", "Al Nahyan family", "Pearl traders", "Local fishermen"],
                    correct: 1
                },
                {
                    q: "How'd they cool it without electricity?",
                    options: ["Ice rooms", "Wind towers", "Underground tunnels", "Water fountains"],
                    correct: 1
                },
                {
                    q: "When did it reopen as a museum?",
                    options: ["2010", "2015", "2018", "2020"],
                    correct: 2
                }
            ];

            const handleAnswer = (idx) => {
                setSelected(idx);
                if (idx === questions[currentQ].correct) setScore(score + 1);

                setTimeout(() => {
                    if (currentQ < questions.length - 1) {
                        setCurrentQ(currentQ + 1);
                        setSelected(null);
                    } else {
                        setDone(true);
                    }
                }, 1000);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4" role="dialog" aria-modal="true" aria-label="Quiz">
                    <div className="bg-white max-w-2xl w-full max-h-[90vh] overflow-y-auto" style={{borderRadius: '8px'}}>

                        </div>

                        <div className="p-10">
                            {!done ? (
                                <>
                                    <div className="mb-8">
                                        <div className="flex justify-between text-gray-600 mb-3">
                                            <span className="font-semibold">Question {currentQ + 1} of {questions.length}</span>
                                            <span className="font-semibold">Score: {score}</span>
                                        </div>
                                        <div className="w-full bg-gray-200 h-3">
                                            <div className="bg-amber-600 h-3 transition-all" style={{width: `${((currentQ + 1) / questions.length) * 100}%`}}></div>
                                        </div>
                                    </div>

                                    <h3 className="text-2xl font-semibold text-gray-900 mb-8">{questions[currentQ].q}</h3>

                                    <div className="space-y-4">
                                        {questions[currentQ].options.map((opt, idx) => (
                                            <button
                                                key={idx}
                                                onClick={() => handleAnswer(idx)}
                                                disabled={selected !== null}
                                                className={`w-full p-5 text-left text-lg font-semibold transition-all ${
                                                    selected === null
                                                        ? 'bg-gray-100 hover:bg-amber-100'
                                                        : selected === idx
                                                            ? idx === questions[currentQ].correct
                                                                ? 'bg-green-100 border-2 border-green-600'
                                                                : 'bg-red-100 border-2 border-red-600'
                                                            : idx === questions[currentQ].correct
                                                                ? 'bg-green-100 border-2 border-green-600'
                                                                : 'bg-gray-100'
                                                }`}
                                                style={{borderRadius: '8px', minHeight: '44px'}}
                                                aria-label={`Option ${idx + 1}: ${opt}`}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                </>
                            ) : (
                                <div className="text-center py-12">
                                    <div className="icon-circle" style={{width: '120px', height: '120px', fontSize: '48px', margin: '0 auto 24px'}} aria-hidden="true">
                                        <i className={`fas ${score === 5 ? 'fa-trophy' : score >= 3 ? 'fa-star' : 'fa-book-open'}`}></i>
                                    </div>
                                    <h3 className="text-4xl font-semibold text-gray-900 mb-6">All Done!</h3>
                                    <p className="text-3xl text-gray-700 mb-8">You got {score} out of 5 right</p>
                                    <p className="text-xl text-gray-600 mb-12">
                                        {score === 5 ? "Perfect! You know your stuff about the fort!" :
                                         score >= 3 ? "Nice! Got most of them right!" :
                                         "Not bad! Check out the site again and retry!"}
                                    </p>
                                    <button

                                        className="bg-gradient-to-r from-amber-700 to-amber-600 text-white px-10 py-4 text-lg font-semibold hover:from-amber-800 hover:to-amber-700"

                            )}
