            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .timeline-line {
            border-left: 3px solid #c29a6c;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;

            top: 0;

                                        title="Wind Towers"

                                        perfect for the hot desert climate. The coral stone stays cool even in extreme heat, and the thick walls

                                            Water Guardian

                                            so protecting this resource was crucial for the survival of the whole community.
                                        </p>

                                    <FactCard

                                        revealed={revealedFacts.fact3}

                                        <p className="text-gray-700 leading-relaxed italic">
                                            "Working on this project really opened our eyes to how much history is in Abu Dhabi.
                                            Before this, we knew Qasr Al Hosn was old, but we didn't realize it was literally where the whole
                                            city started! It's cool to think that this building has been standing since 1761 - that's over 260 years ago."
                                        </p>
                                        <p className="text-amber-900 font-semibold mt-3">- Fayez, Majd, Ayham & Ram</p>
                                    </div>

                                    <div className="grid md:grid-cols-2 gap-6">
                                        <div className="bg-blue-50 p-6 rounded-lg">
                                            <h3 className="font-bold text-blue-900 mb-2">What Surprised Us</h3>
                                            <p className="text-gray-700 text-sm">
                                                We were surprised to learn that the fort was built to protect a water well. In today's world where
                                                we have water everywhere, it's hard to imagine water being so precious that you'd build a whole
                                                fort around it!
                                            </p>

                                        <div className="bg-green-50 p-6 rounded-lg">
                                            <h3 className="font-bold text-green-900 mb-2">Why It Matters Today</h3>
                                            <p className="text-gray-700 text-sm">
                                                Even though the UAE is super modern now with skyscrapers and technology, places like Qasr Al Hosn
                                                remind us where we came from. It's important to remember our history and the people who built
                                                this country from scratch.
                                            </p>
                                        </div>
                                    </div>

                                    <div className="bg-amber-50 p-6 rounded-lg">
                                        <h3 className="text-xl font-bold text-amber-900 mb-3">Our Favorite Part</h3>
                                        <p className="text-gray-700 leading-relaxed">
                                            Creating this website taught us that you can make history interesting and interactive. Museums
                                            don't have to be boring! By adding videos, quizzes, and interactive elements, we can help people
                                            of all ages learn about and appreciate our heritage. We hope you enjoyed exploring Qasr Al Hosn
                                            as much as we enjoyed researching and building this site!
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Resources */}
                        <section id="resources" className="mb-16 fade-in">
                            <div className="bg-white rounded-xl shadow-lg p-8">
                                <h2 className="text-4xl font-bold header-font text-amber-900 mb-6">Resources & Learn More</h2>
                                <p className="text-gray-600 mb-8">Want to learn more about Qasr Al Hosn and UAE heritage?</p>

                                <div className="grid md:grid-cols-2 gap-6">
                                    <div>
                                        <h3 className="text-xl font-bold text-amber-900 mb-4">🔗 Official Links</h3>
                                        <div className="space-y-3">
                                            <a href="https://qasralhosn.ae" target="_blank" className="block bg-amber-50 p-4 rounded-lg hover:bg-amber-100 transition-all">
                                                <p className="font-semibold text-amber-900">Official Qasr Al Hosn Website</p>
                                                <p className="text-sm text-gray-600">qasralhosn.ae</p>
                                            </a>
                                            <a href="https://dct.gov.ae" target="_blank" className="block bg-amber-50 p-4 rounded-lg hover:bg-amber-100 transition-all">
                                                <p className="font-semibold text-amber-900">Department of Culture & Tourism - Abu Dhabi</p>
                                                <p className="text-sm text-gray-600">dct.gov.ae</p>
                                            </a>
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="text-xl font-bold text-amber-900 mb-4">📚 Further Reading</h3>
                                        <ul className="space-y-3 text-gray-700">
                                            <li className="flex items-start">
                                                <span className="mr-2">•</span>
                                                <span>Books about UAE history and heritage</span>
                                            </li>
                                            <li className="flex items-start">
                                                <span className="mr-2">•</span>
                                                <span>Documentaries about the founding of Abu Dhabi</span>
                                            </li>
                                            <li className="flex items-start">
                                                <span className="mr-2">•</span>
                                                <span>Articles about traditional Emirati architecture</span>
                                            </li>
                                            <li className="flex items-start">
                                                <span className="mr-2">•</span>
                                                <span>Research papers on pearling industry history</span>
                                            </li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="mt-8 bg-gradient-to-r from-amber-100 to-orange-100 p-6 rounded-lg">
                                    <h3 className="text-xl font-bold text-amber-900 mb-2">📖 Our Sources</h3>
                                    <p className="text-gray-700 text-sm">
                                        This website was created based on research from official government sources, educational materials

                    </main>

                    {/* Quiz Modal */}
                    {showQuiz && <QuizModal onClose={() => setShowQuiz(false)} />}

                    {/* Footer */}
                    <footer className="bg-gradient-to-r from-amber-900 to-amber-700 text-white py-8 mt-16">
                        <div className="container mx-auto px-4 text-center">
                            <p className="text-xl font-semibold mb-2">Multimedia Project: Preserving Culture</p>
                            <p className="text-amber-200">Created by: Fayez Akkad, Majd Yousif, Ayham Albasha, Ram Khaddam</p>
                            <p className="text-amber-200 text-sm mt-2">Grade 9B - 2026</p>
                            <div className="mt-4 text-amber-100 text-sm">
                                <p>Qasr Al Hosn - Where Abu Dhabi's story began 🏰</p>
                            </div>

                    </footer>

            );
        }

        // Timeline Event Component
        function TimelineEvent({ year, title, description }) {
            return (
                <div className="flex gap-4">
                    <div className="flex flex-col items-center">
                        <div className="w-16 h-16 bg-amber-600 rounded-full flex items-center justify-center text-white font-bold shrink-0">
                            {year.substring(0, 4)}
                        </div>
                        <div className="w-1 h-full bg-amber-300 mt-2"></div>
                    </div>
                    <div className="pb-8 flex-1">
                        <h3 className="text-xl font-bold text-amber-900 mb-2">{title}</h3>
                        <p className="text-gray-700 leading-relaxed">{description}</p>
                    </div>
                </div>
            );
        }

        // Architecture Card Component
        function ArchitectureCard({ title, icon, description }) {
            return (
                <div className="bg-gradient-to-br from-amber-50 to-orange-50 p-6 rounded-lg card-hover">
                    <div className="text-4xl mb-3">{icon}</div>
                    <h3 className="text-xl font-bold text-amber-900 mb-2">{title}</h3>
                    <p className="text-gray-700 text-sm">{description}</p>
                </div>
            );
        }

        // Image Placeholder Component
        function ImagePlaceholder({ title }) {
            return (
                <div className="aspect-square bg-gradient-to-br from-gray-200 to-gray-300 rounded-lg flex items-center justify-center hover:scale-105 transition-transform cursor-pointer">
                    <div className="text-center p-4">
                        <div className="text-4xl mb-2">🖼️</div>
                        <p className="text-gray-600 text-sm font-semibold">{title}</p>
                        <p className="text-xs text-gray-500 mt-1">(Add image)</p>
                    </div>
                </div>
            );
        }

        // Fact Card Component
        function FactCard({ id, icon, title, fact, revealed, onReveal }) {
            return (
                <div
                    onClick={onReveal}
                    className={`p-6 rounded-lg cursor-pointer transition-all card-hover ${
                        revealed ? 'bg-gradient-to-br from-amber-100 to-orange-100' : 'bg-gray-100 hover:bg-gray-200'
                    }`}
                >
                    <div className="text-4xl mb-3">{icon}</div>
                    <h3 className="text-lg font-bold text-amber-900 mb-2">{title}</h3>
                    {revealed ? (
                        <p className="text-gray-700 text-sm leading-relaxed">{fact}</p>
                    ) : (
                        <p className="text-gray-500 text-sm italic">Click to reveal!</p>
                    )}
                </div>
            );
        }

        // Quiz Modal Component
        function QuizModal({ onClose }) {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);

            const questions = [
                {
                    question: "When was the watchtower at Qasr Al Hosn first built?",
                    options: ["1761", "1800", "1850", "1900"],
                    correct: 0
                },
                {
                    question: "What was Qasr Al Hosn built to protect?",
                    options: ["Gold treasure", "A freshwater well", "Royal jewels", "Trade goods"],
                    correct: 1
                },
                {
                    question: "Which family made Qasr Al Hosn their home?",
                    options: ["Bani Yas tribe", "Al Nahyan family", "Pearl traders", "Fishermen"],
                    correct: 1
                },
                {
                    question: "What natural cooling system did the fort use?",
                    options: ["Ice rooms", "Wind towers", "Underground tunnels", "Water fountains"],
                    correct: 1
                },
                {
                    question: "When was Qasr Al Hosn reopened as a museum?",
                    options: ["2010", "2015", "2018", "2020"],
                    correct: 2
                }
            ];

            const handleAnswer = (index) => {
                setSelectedAnswer(index);
                if (index === questions[currentQuestion].correct) {
                    setScore(score + 1);
                }

                setTimeout(() => {
                    if (currentQuestion < questions.length - 1) {
                        setCurrentQuestion(currentQuestion + 1);
                        setSelectedAnswer(null);
                    } else {
                        setShowResult(true);
                    }
                }, 1000);
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="bg-gradient-to-r from-amber-600 to-amber-700 p-6 text-white">
                            <div className="flex justify-between items-center">
                                <h2 className="text-2xl font-bold">Discovery Quiz</h2>
                                <button onClick={onClose} className="text-3xl hover:text-amber-200">&times;</button>
                            </div>
                        </div>

                        <div className="p-8">
                            {!showResult ? (
                                <>
                                    <div className="mb-6">
                                        <div className="flex justify-between text-sm text-gray-600 mb-2">
                                            <span>Question {currentQuestion + 1} of {questions.length}</span>
                                            <span>Score: {score}</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-2">
                                            <div
                                                className="bg-amber-600 h-2 rounded-full transition-all"
                                                style={{ width: `${((currentQuestion + 1) / questions.length) * 100}%` }}
                                            ></div>
                                        </div>
                                    </div>

                                    <h3 className="text-xl font-bold text-gray-800 mb-6">
                                        {questions[currentQuestion].question}
                                    </h3>

                                    <div className="space-y-3">
                                        {questions[currentQuestion].options.map((option, index) => (
                                            <button
                                                key={index}
                                                onClick={() => handleAnswer(index)}
                                                disabled={selectedAnswer !== null}
                                                className={`w-full p-4 rounded-lg text-left transition-all ${
                                                    selectedAnswer === null
                                                        ? 'bg-gray-100 hover:bg-amber-100 hover:border-amber-600 border-2 border-transparent'
                                                        : selectedAnswer === index
                                                            ? index === questions[currentQuestion].correct
                                                                ? 'bg-green-100 border-2 border-green-600'
                                                                : 'bg-red-100 border-2 border-red-600'
                                                            : index === questions[currentQuestion].correct
                                                                ? 'bg-green-100 border-2 border-green-600'
                                                                : 'bg-gray-100 border-2 border-transparent'
                                                }`}
                                            >
                                                {option}
                                            </button>
                                        ))}
                                    </div>
                                </>
                            ) : (
                                <div className="text-center py-8">
                                    <div className="text-6xl mb-4">
                                        {score === questions.length ? '🏆' : score >= 3 ? '⭐' : '📚'}
                                    </div>
                                    <h3 className="text-3xl font-bold text-amber-900 mb-4">
                                        Quiz Complete!
                                    </h3>
                                    <p className="text-2xl text-gray-700 mb-6">
                                        You scored {score} out of {questions.length}
                                    </p>
                                    <p className="text-gray-600 mb-8">
                                        {score === questions.length
                                            ? "Perfect score! You're a Qasr Al Hosn expert! 🎉"
                                            : score >= 3
                                                ? "Great job! You know a lot about Qasr Al Hosn!"
                                                : "Good try! Want to read through the website again and retake the quiz?"}
                                    </p>
                                    <button
                                        onClick={onClose}
                                        className="bg-gradient-to-r from-amber-600 to-amber-700 text-white px-8 py-3 rounded-lg font-semibold hover:from-amber-700 hover:to-amber-800"
                                    >
                                        Close Quiz
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.render(<QasrAlHosnWebsite />, document.getElementById('root'));
    </script>
</body>
</html>
